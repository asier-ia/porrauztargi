version: '3.8'

services:
  backend:
    build: ./backend
    container_name: uztargi_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./uztargi_porra.db
      - FOOTBALL_DATA_API_KEY=${FOOTBALL_DATA_API_KEY}
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: uztargi_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  # Caddy solo necesario en producción con dominio real.
  # En local usa los puertos directos:
  #   Frontend → http://localhost:5173
  #   Backend  → http://localhost:8000/api/...
  # caddy:
  #   image: caddy:2-alpine
  #   container_name: uztargi_caddy
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - frontend
  #     - backend

volumes:
  caddy_data:
  caddy_config:
